<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>anima - diari d'ànim</title>
    <style>
        /* CSS amb estil Glassmorphism */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #fff;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 2rem;
            width: 350px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h2 { text-align: center; font-weight: 600; }

        .emoji-selector {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }

        .emoji {
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .emoji:hover { transform: scale(1.3); }

        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 10px;
            color: white;
            resize: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2>Com et sents?</h2>
        <div class="emoji-selector" id="emojiSelector">
            <span class="emoji" data-mood="😊">😊</span>
            <span class="emoji" data-mood="😐">😐</span>
            <span class="emoji" data-mood="😢">😢</span>
            <span class="emoji" data-mood="😡">😡</span>
        </div>
        <textarea id="note" rows="3" placeholder="Què tens al cap?"></textarea>
        <button onclick="saveMood()">Desar registre</button>
        <div id="history"></div>
    </div>

    <script>
        // Lògica JavaScript
        let selectedMood = '😊';

        document.querySelectorAll('.emoji').forEach(el => {
            el.addEventListener('click', () => selectedMood = el.getAttribute('data-mood'));
        });

        function saveMood() {
            const note = document.getElementById('note').value;
            const entry = { mood: selectedMood, note: note, date: new Date().toLocaleString() };
            
            let logs = JSON.parse(localStorage.getItem('moodLogs') || '[]');
            logs.push(entry);
            localStorage.setItem('moodLogs', JSON.stringify(logs));
            
            alert('Registre desat!');
            document.getElementById('note').value = '';
        }
    </script>
</body>
</html>
