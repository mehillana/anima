<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --blau-fluix: #89CFF0;
            --blau-fort: #003366;
            --lila: #9370DB;
            --fons-galaxia: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background: var(--fons-galaxia);
            margin: 0;
            display: flex;
            height: 100vh;
            color: white;
        }

        /* Barra lateral */
        .sidebar {
            width: 80px;
            background: rgba(0, 51, 102, 0.3);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            border-right: 1px solid rgba(137, 207, 240, 0.2);
        }

        .tool-icon {
            width: 40px;
            margin-bottom: 20px;
            fill: var(--blau-fluix);
            cursor: pointer;
            transition: 0.3s;
        }

        .tool-icon:hover { fill: var(--lila); }

        /* Contingut principal */
        .main {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 400px;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--lila);
            color: white;
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <!-- SVG Tool 1: Home -->
        <svg class="tool-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <!-- SVG Tool 2: Settings -->
        <svg class="tool-icon" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
    </nav>

    <main class="main">
        <div class="card">
            <h2>Diari d'Ànim</h2>
            <p>Com et sents avui?</p>
            <textarea id="note" placeholder="Escriu aquí..."></textarea>
            <button onclick="saveMood()" style="margin-top:10px; cursor:pointer;">Desar</button>
        </div>
    </main>

    <script>
        function saveMood() {
            const note = document.getElementById('note').value;
            console.log("Nota desada:", note);
            alert("Registre desat al diari galàctic!");
        }
    </script>
</body>
</html>
