<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --blau-fort: #0f172a;
            --blau-fluix: #89CFF0;
            --lila: #9370DB;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Open Sans', sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
        }

        /* Barra Lateral */
        .sidebar {
            width: 260px;
            background: var(--blau-fort);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .menu-item:hover { background: rgba(147, 112, 219, 0.2); }

        .menu-item svg { width: 24px; margin-right: 15px; fill: var(--blau-fluix); }

        /* Contingut Principal */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--lila);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2 style="font-size: 1.2rem; margin-bottom: 30px;">Espai Memòria</h2>
        <div class="menu-item">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Inici</span>
        </div>
        <div class="menu-item">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
            <span>Arxiu de Perfils</span>
        </div>
    </aside>

    <main class="main-content">
        <h1>Benvingut al Diari</h1>
        <div class="card">
            <h3>Com et sents avui?</h3>
            <textarea id="moodNote" rows="4"></textarea>
            <button onclick="saveNote()" style="margin-top:15px; padding:10px 20px; background:var(--lila); border:none; color:white; border-radius:5px; cursor:pointer;">Desar nota</button>
        </div>
    </main>

    <script>
        function saveNote() {
            const text = document.getElementById('moodNote').value;
            alert("Nota desada al teu diari personal!");
            console.log("Dada desada:", text);
        }
    </script>
</body>
</html>
